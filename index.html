pages/Biography.jsx":"import { motion } from 'framer-motion';\nimport { ScrollText, Calendar, MapPin, Music } from 'lucide-react';\n\nconst Biography = () => {\n  const timeline = [\n    { year: '1898', event: 'الميلاد في قرية \"طماي الزهايرة\" بمحافظة الدقهلية.' },\n    { year: '1910', event: 'بدأت الغناء وهي طفلة مع والدها في الموالد والأفراح.' },\n    { year: '1923', event: 'الانتقال إلى القاهرة وبداية بزوغ نجمها في المسارح الكبرى.' },\n    { year: '1934', event: 'افتتحت بصوتها الإذاعة المصرية الرسمية.' },\n    { year: '1944', event: 'منحها الملك فاروق \"نيشان الكمال\" ولقب \"صاحبة العصمة\".' },\n    { year: '1967', event: 'قامت بجولات عالمية لدعم المجهود الحربي بعد النكسة.' },\n    { year: '1975', event: 'رحيل كوكب الشرق وتشييع جنازة مهيبة حضرها الملايين.' },\n  ];\n\n  return (\n    <div className=\"py-20 px-4 max-w-5xl mx-auto\">\n      <motion.div \n        initial={{ opacity: 0 }}\n        animate={{ opacity: 1 }}\n        className=\"mb-16 text-center\"\n      >\n        <h1 className=\"text-4xl md:text-6xl font-black gold-gradient mb-6\">المسيرة والميلاد</h1>\n        <p className=\"text-gray-400 max-w-2xl mx-auto leading-relaxed\">\n          فاطمة إبراهيم البلتاجي، التي عرفها العالم باسم أم كلثوم. قصة كفاح بدأت من القرية لتصل إلى قمة المجد الغنائي العالمي.\n        </p>\n      </motion.div>\n\n      <div className=\"space-y-12\">\n        <div className=\"grid md:grid-cols-2 gap-12 items-center\">\n          <motion.div \n            initial={{ x: -50, opacity: 0 }}\n            whileInView={{ x: 0, opacity: 1 }}\n            className=\"aspect-[3/4] rounded-3xl overflow-hidden shadow-2xl border border-white/10\"\n          >\n            <img \n              src=\"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Oum_Kalthoum_1960s.png/800px-Oum_Kalthoum_1960s.png\" \n              alt=\"Umm Kulthum Portrait\" \n              className=\"w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700\"\n            />\n          </motion.div>\n          \n          <div className=\"space-y-6\">\n            <h2 className=\"text-3xl font-bold flex items-center gap-3\">\n              <ScrollText className=\"text-[#d4af37]\" />\n              نشأتها\n            </h2>\n            <p className=\"text-gray-300 leading-relaxed\">\n              ولدت في بيت متواضع، وكان والدها مؤذناً وحافظاً للقرآن. تعلمت منه مخارج الحروف وقواعد الترتيل، مما صقل صوتها القوي والرخيم منذ الصغر. كانت تخفي أنوثتها بزي بدوي وتغني في الفرق الإنشادية حتى لا يمنعها المجتمع آنذاك.\n            </p>\n            <div className=\"grid grid-cols-2 gap-4\">\n              <div className=\"p-4 glass-morphism rounded-xl\">\n                <MapPin className=\"text-[#d4af37] mb-2\" />\n                <h4 className=\"font-bold\">المسقط</h4>\n                <p className=\"text-xs text-gray-400\">طماي الزهايرة، مصر</p>\n              </div>\n              <div className=\"p-4 glass-morphism rounded-xl\">\n                <Music className=\"text-[#d4af37] mb-2\" />\n                <h4 className=\"font-bold\">الصوت</h4>\n                <p className=\"text-xs text-gray-400\">كونترالتو / ميزو-سوبرانو</p>\n              </div>\n            </div>\n          </div>\n        </div>\n\n        <div className=\"py-20\">\n          <h2 className=\"text-3xl font-bold text-center mb-16\">التسلسل الزمني</h2>\n          <div className=\"relative border-r-2 border-[#d4af37]/30 mr-4 md:mr-0 md:border-r-0 md:before:content-[''] md:before:absolute md:before:w-1 md:before:h-full md:before:bg-[#d4af37]/30 md:before:left-1/2\">\n            {timeline.map((item, index) => (\n              <motion.div \n                key={index}\n                initial={{ opacity: 0, y: 20 }}\n                whileInView={{ opacity: 1, y: 0 }}\n                transition={{ delay: index * 0.1 }}\n                className={`mb-12 relative flex items-center justify-between w-full ${index % 2 === 0 ? 'md:flex-row-reverse' : ''}`}\n              >\n                <div className=\"md:w-5/12 hidden md:block\"></div>\n                <div className=\"absolute right-[-9px] md:left-1/2 md:ml-[-8px] w-4 h-4 bg-[#d4af37] rounded-full z-10\"></div>\n                <div className=\"w-full md:w-5/12 glass-morphism p-6 rounded-2xl mr-8 md:mr-0\">\n                  <span className=\"text-[#d4af37] font-black text-xl mb-2 block\">{item.year}</span>\n                  <p className=\"text-gray-300\">{item.event}</p>\n                </div>\n              </motion.div>\n            ))}\n          </div>\n        </div>\n      </div>\n    </div>\n  );\n};\n\nexport default Biography;","/pages/Songs.jsx":"import { useState } from 'react';\nimport { motion } from 'framer-motion';\nimport { Play, Filter, Clock, Users } from 'lucide-react';\n\nconst Songs = () => {\n  const songs = [\n    { title: \"أنت عمري\", year: \"1964\", composer: \"محمد عبد الوهاب\", poet: \"أحمد شفيق كامل\", duration: \"58:00\" },\n    { title: \"ألف ليلة وليلة\", year: \"1969\", composer: \"بليغ حمدي\", poet: \"مرسي جميل عزيز\", duration: \"54:00\" },\n    { title: \"الأطلال\", year: \"1966\", composer: \"رياض السنباطي\", poet: \"إبراهيم ناجي\", duration: \"50:00\" },\n    { title: \"سيرة الحب\", year: \"1964\", composer: \"بليغ حمدي\", poet: \"مرسي جميل عزيز\", duration: \"45:00\" },\n    { title: \"فكروني\", year: \"1966\", composer: \"محمد عبد الوهاب\", poet: \"عبد الوهاب محمد\", duration: \"52:00\" },\n    { title: \"أمل حياتي\", year: \"1965\", composer: \"محمد عبد الوهاب\", poet: \"أحمد شفيق كامل\", duration: \"48:00\" },\n    { title: \"دارت الأيام\", year: \"1970\", composer: \"محمد عبد الوهاب\", poet: \"مأمون الشناوي\", duration: \"55:00\" },\n    { title: \"حب إيه\", year: \"1960\", composer: \"بليغ حمدي\", poet: \"عبد الوهاب محمد\", duration: \"40:00\" },\n  ];\n\n  const [searchTerm, setSearchTerm] = useState(\"\");\n\n  const filteredSongs = songs.filter(s => s.title.includes(searchTerm) || s.composer.includes(searchTerm));\n\n  return (\n    <div class opacity-100 transition-opacity flex items-end p-6\">\n              <span className=\"text-sm font-medium\">أرشيف كوكب الشرق</span>\n            </div>\n          </motion.div>\n        ))}\n      </div>\n    </div>\n  );\n};\n\nexport default Gallery;","/pages/Guestbook.jsx":"import { useState, useEffect } from 'react';\nimport { motion, AnimatePresence } from 'framer-motion';\nimport { Send, User, MessageCircle, Heart } from 'lucide-react';\n\nconst Guestbook = () => {\n  const [messages, setMessages] = useState([]);\n  const [name, setName] = useState(\"\");\n  const [text, setText] = useState(\"\");\n  const [isSubmitting, setIsSubmitting] = useState(false);\n\n  useEffect(() => {\n    fetchMessages();\n  }, []);\n\n  const fetchMessages = async () => {\n    try {\n      const res = await fetch(\"/api/data/guestbook\");\n      const data = await res.json();\n      setMessages(data);\n    } catch (e) {\n      console.error(e);\n    }\n  };\n\n  const handleSubmit = async (e) => {\n    e.preventDefault();\n    if (!name || !text) return;\n\n    setIsSubmitting(true);\n    const newMessage = { \n      name, \n      text, \n      date: new Date().toLocaleDateString('ar-EG'),\n      likes: 0\n    };\n\n    try {\n      await fetch(\"/api/data/guestbook\", {\n        method: \"POST\",\n        headers: { \"Content-Type\": \"application/json\" },\n        body: JSON.stringify(newMessage)\n      });\n      setName(\"\");\n      setText(\"\");\n      fetchMessages();\n    } catch (e) {\n      console.error(e);\n    } finally {\n      setIsSubmitting(false);\n    }\n  };\n\n  return (\n    <div className=\"py-20 px-4 max-w-4xl mx-auto\">\n      <div className=\"text-center mb-16\">\n        <h1 className=\"text-5xl font-black gold-gradient mb-4\">دفتر الزوار</h1>\n        <p className=\"text-gray-400\">اترك كلمة في ذكرى سيدة الغناء العربي.</p>\n      </div>\n\n      <div className=\"grid md:grid-cols-5 gap-12\">\n        <div className=\"md:col-span-2\">\n          <form onSubmit={handleSubmit} className=\"glass-morphism p-6 rounded-3xl sticky top-28 space-y-4\">\n            <div>\n              <label className=\"block text-sm font-medium text-gray-400 mb-2\">الاسم</label>\n              <input \n                value={name}\n                onChange={(e) => setName(e.target.value)}\n                className=\"w-full bg-[#0c0c0c] border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-[#d4af37]\"\n                placeholder=\"اسمك الكريم\"\n                required\n              />\n            </div>\n            <div>\n              <label className=\"block text-sm font-medium text-gray-400 mb-2\">رسالتك</label>\n              <textarea \n                value={text}\n                onChange={(e) => setText(e.target.value)}\n                rows=\"4\"\n                className=\"w-full bg-[#0c0c0c] border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-[#d4af37] resize-none\"\n                placeholder=\"ماذا تحب أن تقول؟\"\n                required\n              ></textarea>\n            </div>\n            <button \n              disabled={isSubmitting}\n              className=\"w-full bg-[#d4af37] text-black font-bold py-3 rounded-xl hover:bg-[#b8962d] transition-all flex items-center justify-center gap-2\"\n            >\n              {isSubmitting ? \"جاري الإرسال...\" : <><Send size={18}/> إرسال</>}\n            </button>\n          </form>\n        </div>\n\n        <div className=\"md:col-span-3 space-y-6\">\n          <AnimatePresence initial={false}>\n            {messages.length === 0 ? (\n              <div className=\"text-center py-20 text-gray-500 italic\">لا توجد رسائل بعد.. كن أول من يعبر عن حبه.</div>\n            ) : (\n              messages.map((msg) => (\n                <motion.div\n                  key={msg.id}\n                  initial={{ opacity: 0, x: 20 }}\n                  animate={{ opacity: 1, x: 0 }}\n                  className=\"glass-morphism p-6 rounded-2xl relative overflow-hidden\"\n                >\n                  <div className=\"absolute top-0 right-0 w-1 h-full bg-[#d4af37]\"></div>\n                  <div className=\"flex justify-between items-start mb-4\">\n                    <div className=\"flex items-center gap-2\">\n                      <div className=\"w-10 h-10 bg-[#d4af37]/10 rounded-full flex items-center justify-center text-[#d4af37]\">\n                        <User size={20}/>\n                      </div>\n                      <div>\n                        <h4 className=\"font-bold\">{msg.name}</h4>\n                        <span className=\"text-[10px] text-gray-500 uppercase\">{msg.date}</span>\n                      </div>\n                    </div>\n                    <Heart size={16} className=\"text-gray-600 cursor-pointer hover:text-red-500 transition-colors\" />\n                  </div>\n                  <p className=\"text-gray-300 text-sm leading-relaxed\">{msg.text}</p>\n                </motion.div>\n              ))\n            )}\n          </AnimatePresence>\n        </div>\n      </div>\n    </div>\n  );\n};\n\nexport default Guestbook;","/components/Footer.jsx":"import { Mic2, Mail, Globe, Heart } from 'lucide-react';\n\nconst Footer = () => {\n  return (\n    <footer className=\"bg-[#080808] border-t border-white/10 py-16\">\n      <div className=\"max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-12\">\n        <div className=\"col-span-1 md:col-span-2\">\n          <div className=\"flex items-center gap-2 mb-6\">\n            <Mic2 className=\"text-[#d4af37] w-6 h-6\" />\n            <span className=\"text-2xl font-bold gold-gradient\">كوكب الشرق</span>\n          </div>\n          <p className=\"text-gray-400 leading-relaxed max-w-sm\">\n            منصة مخصصة لتخليد ذكرى سيدة الغناء العربي أم كلثوم، والحفاظ على تراثها الفني الفريد للأجيال القادمة.\n          </p>\n        </div>\n        \n        <div>\n          <h4 className=\"font-bold mb-6 flex items-center gap-2\"><Globe size={18} className=\"text-[#d4af37]\"/> روابط سريعة</h4>\n          <ul className=\"space-y-4 text-sm text-gray-500\">\n            <li><a href=\"/\" className=\"hover:text-[#d4af37] transition-colors\">الرئيسية</a></li>\n            <li><a href=\"/biography\" className=\"hover:text-[#d4af37] transition-colors\">السيرة الذاتية</a></li>\n            <li><a href=\"/songs\" className=\"hover:text-[#d4af37] transition-colors\">الأعمال الغنائية</a></li>\n          </ul>\n        </div>\n\n        <div>\n          <h4 className=\"font-bold mb-6 flex items-center gap-2\"><Mail size={18} className=\"text-[#d4af37]\"/> تواصل معنا</h4>\n          <p className=\"text-sm text-gray-500 mb-4\">للإعلام أو طلبات الأرشيف:</p>\n          <a href=\"mailto:info@omkalthoum.com\" className=\"text-[#d4af37] text-sm font-mono\">info@omkalthoum.com</a>\n        </div>\n      </div>\n      \n      <div className=\"max-w-7xl mx-auto px-4 mt-16 pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-gray-600\">\n        <p>© {new Date().getFullYear()} أرشيف سيدة الغناء العربي. جميع الحقوق محفوظة.</p>\n        <p className=\"flex items-center gap-1\">صنع بكل <Heart size={12} className=\"text-red-900 fill-red-900\" /> في مصر</p>\n      </div>\n    </footer>\n  );\n};\n\nexport default Footer;"};
  const ENTRY = "/main.jsx";
  const moduleCache = {};
  const inflight = {};

  function resolvePath(from, spec) {
    // External (mapped via importmap) — keep as-is
    if (!spec.startsWith('.') && !spec.startsWith('/')) return null;
    let base = from.replace(/[^/]+$/, '');
    let path = spec.startsWith('/') ? spec : (base + spec);
    // normalize ../ and ./
    const segs = [];
    for (const s of path.split('/')) {
      if (s === '' || s === '.') continue;
      if (s === '..') segs.pop();
      else segs.push(s);
    }
    const tryPaths = [];
    const p = '/' + segs.join('/');
    tryPaths.push(p);
    for (const ext of ['.jsx', '.js', '.tsx', '.ts']) tryPaths.push(p + ext);
    for (const ext of ['.jsx', '.js', '.tsx', '.ts']) tryPaths.push(p + '/index' + ext);
    for (const t of tryPaths) if (FILES[t] !== undefined) return t;
    return null;
  }

  function transform(code, path) {
    const presets = ['react'];
    if (/.tsx?$/.test(path)) presets.push('typescript');
    return Babel.transform(code, {
      presets: presets.map((p) => p === 'typescript' ? ['typescript', { allExtensions: true, isTSX: true }] : p),
      plugins: [],
      filename: path,
      sourceType: 'module',
    }).code;
  }

  // Build a per-module ESM source via dynamic import using a Blob URL.
  async function loadModule(path) {
    if (moduleCache[path]) return moduleCache[path];
    if (inflight[path]) return inflight[path];
    const src = FILES[path];
    if (src === undefined) throw new Error('Module not found: ' + path);

    // Rewrite relative imports to Blob-loaded modules; leave bare specifiers for importmap.
    const transformed = transform(src, path);

    // Find import/export-from sources, swap relative ones with awaited blob URLs.
    const importRegex = /(import\s+(?:[\w*\s{},]+\s+from\s+)?|export\s+\*\s+from\s+|export\s+\{[^}]*\}\s+from\s+)["']([^"']+)["']/g;
    const deps = [];
    let m;
    const re = new RegExp(importRegex.source, 'g');
    while ((m = re.exec(transformed)) !== null) {
      const spec = m[2];
      const resolved = resolvePath(path, spec);
      if (resolved) deps.push({ spec, resolved });
    }

    // Pre-load dependencies and build a map of original spec -> blob URL
    const depUrls = {};
    for (const d of deps) {
      const url = await loadModule(d.resolved);
      depUrls[d.spec] = url;
    }

    const finalCode = transformed.replace(re, (full, prefix, spec) => {
      if (depUrls[spec]) return prefix + '"' + depUrls[spec] + '"';
      return full;
    });

    const blob = new Blob([finalCode], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    moduleCache[path] = url;
    return url;
  }

  (async () => {
    try {
      const entryUrl = await loadModule(ENTRY);
      await import(entryUrl);
    } catch (err) {
      console.error('[Webly]', err);
      const msg = (err && err.stack) ? err.stack : String(err);
      document.getElementById('root').innerHTML =
        '<div style="padding:24px;font-family:ui-monospace,monospace;direction:ltr;text-align:left">' +
        '<h2 style="color:#b91c1c;margin:0 0 12px">Webly Runtime Error</h2>' +
        '<pre style="white-space:pre-wrap;color:#7f1d1d;background:#fef2f2;padding:16px;border-radius:8px;border:1px solid #fecaca">' +
        msg.replace(/[&<>]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c])) +
        '</pre></div>';
    }
  })();
</script>
